<div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 space-y-6 shadow-xl">
    <h3 class="text-lg font-bold text-white flex items-center gap-2 border-b border-slate-800 pb-3">
        <i class="fa-brands fa-meta text-blue-500"></i> Simulador de Campanha (Meta Ads)
    </h3>
    
    <form id="campaign-simulator" class="space-y-4 text-xs">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-slate-400 font-semibold mb-1">Objetivo da Campanha</label>
                <select id="sim-objective" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-slate-200">
                    <option value="vendas">Vendas (Conversão)</option>
                    <option value="leads">Geração de Cadastros</option>
                    <option value="trafego">Tráfego</option>
                </select>
            </div>
            <div>
                <label class="block text-slate-400 font-semibold mb-1">Orçamento Diário (R$)</label>
                <input type="number" id="sim-budget" value="50" min="5" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-slate-200">
            </div>
            <div>
                <label class="block text-slate-400 font-semibold mb-1">Público-Alvo</label>
                <select id="sim-audience" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-slate-200">
                    <option value="aberto">Aberto (Broad)</option>
                    <option value="interesses">Interesses Específicos</option>
                    <option value="lookalike">Lookalike 1%</option>
                    <option value="remarketing">Remarketing (Quente)</option>
                </select>
            </div>
            <div>
                <label class="block text-slate-400 font-semibold mb-1">Qualidade do Criativo</label>
                <select id="sim-creative" class="w-full bg-slate-950 border border-slate-800 rounded-lg p-2.5 text-slate-200">
                    <option value="alto">Alta (Vídeo dinâmico, forte hook)</option>
                    <option value="medio">Média (Imagem estática boa)</option>
                    <option value="baixo">Baixa (Amador, sem contraste)</option>
                </select>
            </div>
        </div>
        
        <button type="submit" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-colors mt-4 text-sm flex justify-center items-center gap-2">
            <i class="fa-solid fa-play"></i> Simular Resultados da Campanha
        </button>
    </form>

    <div id="sim-result-box" class="hidden p-5 bg-slate-950 border border-slate-800 rounded-xl space-y-3 mt-4">
        </div>
</div>
